<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM | Secure Enterprise Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #f1f5f9; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-container { background: #ffffff; padding: 2.5rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        h2 { color: #0f172a; margin-bottom: 0.5rem; font-size: 1.75rem; font-weight: 700; text-align: center; }
        p { color: #64748b; text-align: center; margin-bottom: 2rem; font-size: 0.9rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.25rem; }
        label { font-size: 0.85rem; font-weight: 600; color: #334155; }
        .form-control { padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 1rem; color: #0f172a; outline: none; transition: all 0.3s; }
        .form-control:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .login-btn { background: #2563eb; color: #ffffff; padding: 0.75rem; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; width: 100%; margin-top: 1rem; transition: background 0.3s; }
        .login-btn:hover { background: #1d4ed8; }
        .error-msg { background: #fee2e2; color: #dc2626; padding: 0.75rem; border-radius: 6px; font-size: 0.85rem; margin-bottom: 1rem; display: none; text-align: center; font-weight: 500; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Welcome Back</h2>
    <p>Enter credentials to access secured CRM core network</p>

    <div id="errorBox" class="error-msg"></div>

    <form id="loginForm">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" class="form-control" placeholder="admin_user" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="login-btn">Secure Sign In</button>
    </form>
</div>

<script>
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const errorBox = document.getElementById("errorBox");
        errorBox.style.display = "none";

        const loginPayload = {
            username: document.getElementById("username").value,
            password: document.getElementById("password").value
        };

        try {
            const response = await fetch("http://localhost:8080/api/v1/auth/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(loginPayload)
            });

            const data = await response.json();

            if (response.ok && data.token) {
                // 🚀 STEP 2 COMPLETION: JWT Token storage engine activation
                localStorage.setItem("crm_jwt_token", data.token);
                localStorage.setItem("crm_user_role", data.role);

                // Dashboard redirection
                window.location.href = "dashboard.html";
            } else {
                errorBox.innerText = data.error || "Authentication failed strings match error";
                errorBox.style.display = "block";
            }
        } catch (error) {
            console.error("Auth server offline error:", error);
            errorBox.innerText = "Fatal connection failure. CRM Server offline.";
            errorBox.style.display = "block";
        }
    });
</script>
</body>
</html>
